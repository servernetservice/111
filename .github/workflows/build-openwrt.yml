name: OpenWrt-Official-25.12-Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: master # 或者指定 v23.05.x 等稳定分支
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1. 清理磁盘并安装依赖
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        df -h

    - name: 2. 检出源码与更新 Feeds
      run: |
        git clone $REPO_URL openwrt
        cd openwrt
        [ -e ../feeds.conf.default ] && cp ../feeds.conf.default ./feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 3. 注入官方版 .config
      run: |
        cd openwrt
        # 目标平台配置
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        
        # 基础组件与语言
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
        echo "CONFIG_PACKAGE_luci-proto-ipv6=y" >> .config
        
        # 网卡驱动: Intel E1000/E1000E & USB
        echo "CONFIG_PACKAGE_kmod-e1000=y" >> .config
        echo "CONFIG_PACKAGE_kmod-e1000e=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-net-rtl8152=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-net-asix-ax88179=y" >> .config
        
        # 插件集 (不含内核)
        echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-smartdns=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
        echo "CONFIG_PACKAGE_ddns-scripts_cloudflare.com-v4=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-syncdial=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config

        # 执行 DIY 脚本
        chmod +x ../diy-part2.sh
        ../diy-part2.sh
        
        make defconfig

    - name: 4. 下载软件包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 5. 编译 (分步执行以防报错)
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: 6. 上传结果
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Official_Generic_Artifacts
        path: openwrt/bin/targets/x86/64/*
